<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="crawler.css" />
  <title>403 Whisperer — Crawl section</title>
</head>
<body>
  <header>
    <h1>🤫 403 Whisperer — Crawl section</h1>
    <p class="subtitle" id="sourceLine">Loading…</p>
  </header>

  <main>
    <section class="panel">
      <div class="controls">
        <label class="field">
          <span>Output folder name</span>
          <input id="folderName" type="text" placeholder="auto from site" />
        </label>
        <label class="field small">
          <span>Page load wait (ms)</span>
          <input id="settleMs" type="number" value="1500" min="300" step="100" />
        </label>
        <label class="checkbox">
          <input id="includeRaw" type="checkbox" />
          <span>Include raw <code>.html</code></span>
        </label>
      </div>

      <div class="toolbar">
        <span id="selCount">0 selected</span>
        <div class="spacer"></div>
        <button id="selAll" class="link">Select all</button>
        <button id="selNone" class="link">None</button>
        <button id="selSection" class="link">Only this section</button>
        <button id="startBtn" class="primary">Start crawl →</button>
      </div>

      <div class="hint" id="permHint">
        You'll be asked once to grant access to this site so pages can be read in the background.
      </div>

      <ul id="linkList" class="link-list"></ul>
    </section>

    <section class="panel" id="progressPanel" hidden>
      <div class="progress-head">
        <strong id="progressTitle">Crawling…</strong>
        <span id="progressCount"></span>
      </div>
      <div class="bar"><div id="barFill" class="bar-fill"></div></div>
      <div id="status" class="status" hidden></div>
      <ul id="log" class="log"></ul>
    </section>
  </main>

  <script type="module" src="crawler.js"></script>
</body>
</html>
